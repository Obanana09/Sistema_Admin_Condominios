# ==========================================================
# Configuraci\u00f3n SMTP para el sistema Condominio Vista Verde
# ==========================================================
#
# Proveedor de correo: Brevo SMTP
# Protocolo: SMTP con autenticaci\u00f3n y STARTTLS
#
# host: servidor SMTP utilizado para el env\u00edo de correos.
# puerto: puerto SMTP seguro recomendado por Brevo.
#
# smtp.usuario: usuario proporcionado por Brevo para autenticaci\u00f3n.
# smtp.clave: clave SMTP privada generada desde la plataforma Brevo.
#
# remitente: direcci\u00f3n de correo que aparecer\u00e1 como remitente
# de los correos de confirmaci\u00f3n y notificaciones.
#
# nombre.remitente: nombre descriptivo mostrado a los usuarios
# cuando reciben los correos del sistema.
#
# IMPORTANTE:
# Este archivo contiene credenciales sensibles y no debe
# compartirse p\u00fablicamente ni incluirse en repositorios Git.
# ==========================================================

email.host=smtp-relay.brevo.com
email.puerto=587
email.smtp.usuario=********
email.smtp.clave=********
email.remitente=********
email.nombre.remitente=Condominio Vista Verde